name: Build and deploy ASP.Net Core app to Azure Web App - NandisCloset
on:
  push:
    branches:
      - main
  workflow_dispatch:
jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'
      - name: Restore dependencies
        run: dotnet restore src/Presentation/Nop.Web/Nop.Web.csproj
      - name: Build with dotnet
        run: dotnet build src/Presentation/Nop.Web/Nop.Web.csproj --configuration Release --no-restore
      - name: dotnet publish
        run: dotnet publish src/Presentation/Nop.Web/Nop.Web.csproj -c Release -o "${{env.DOTNET_ROOT}}/myapp" --no-build
      - name: Copy App_Data to publish output
        shell: pwsh
        run: |
          $src = "src/Presentation/Nop.Web/App_Data"
          $dest = "${{env.DOTNET_ROOT}}/myapp/App_Data"
          Write-Host "=== Source App_Data contents ==="
          Get-ChildItem $src -Recurse | Select-Object FullName
          Write-Host "================================"
          New-Item -ItemType Directory -Force -Path $dest
          Copy-Item -Path "$src/*" -Destination $dest -Recurse -Force
          Write-Host "=== Destination App_Data contents after copy ==="
          Get-ChildItem $dest -Recurse | Select-Object FullName
          Write-Host "==============================================="
      - name: Create NopCommerce installation files
        shell: pwsh
        run: |
          $appData = "${{env.DOTNET_ROOT}}/myapp/App_Data"
          New-Item -ItemType Directory -Force -Path "$appData/Installation"
          Set-Content -Path "$appData/Installation/installed.htm" -Value "Installed" -Encoding UTF8
          Write-Host "installed.htm written"
      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{env.DOTNET_ROOT}}/myapp
  deploy:
    runs-on: windows-latest
    needs: build
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app
          path: .
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_E25A1F7A5A9D45B2A135A22D8A890092 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_9D0D832C563645B3AD9BAA4A0F4FAE89 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_2FE00892905942C2A24695B168CC8914 }}
      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'NandisCloset'
          slot-name: 'Production'
          package: .
