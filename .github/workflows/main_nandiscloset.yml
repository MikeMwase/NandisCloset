name: Build and deploy ASP.Net Core app to Azure Web App - NandisCloset
on:
  push:
    branches:
      - main
  workflow_dispatch:
jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.x'
      - name: Restore dependencies
        run: dotnet restore src/Presentation/Nop.Web/Nop.Web.csproj
      - name: Build with dotnet
        run: dotnet build src/Presentation/Nop.Web/Nop.Web.csproj --configuration Release --no-restore
      - name: dotnet publish
        run: dotnet publish src/Presentation/Nop.Web/Nop.Web.csproj -c Release -o "${{env.DOTNET_ROOT}}/myapp" --no-build
      - name: Create NopCommerce installation files
        shell: pwsh
        run: |
          $appData = "${{env.DOTNET_ROOT}}/myapp/App_Data"
          New-Item -ItemType Directory -Force -Path $appData
          New-Item -ItemType Directory -Force -Path "$appData/Installation"
          Set-Content -Path "$appData/Installation/installed.htm" -Value "Installed" -Encoding UTF8
          Write-Host "installed.htm written to artifact"
      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{env.DOTNET_ROOT}}/myapp
  deploy:
    runs-on: windows-latest
    needs: build
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app
          path: .
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_E25A1F7A5A9D45B2A135A22D8A890092 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_9D0D832C563645B3AD9BAA4A0F4FAE89 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_2FE00892905942C2A24695B168CC8914 }}
      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'NandisCloset'
          slot-name: 'Production'
          package: .
      - name: Update appsettings.json and write installed.htm via Kudu API
        shell: pwsh
        run: |
          $token = az account get-access-token --resource "https://management.azure.com" --query accessToken -o tsv
          $headers = @{
            "Authorization" = "Bearer $token"
            "Content-Type"  = "application/octet-stream"
            "If-Match"      = "*"
          }
          $getHeaders = @{ "Authorization" = "Bearer $token" }
          $baseUrl = "https://nandiscloset-exfcggcvhrewexcf.scm.southafricanorth-01.azurewebsites.net/api/vfs/site/wwwroot/App_Data"

          # Update connection string in appsettings.json
          $appSettings = Invoke-RestMethod -Uri "$baseUrl/appsettings.json" -Method Get -Headers $getHeaders
          $appSettings.ConnectionStrings.ConnectionString = "${{ secrets.AZURE_SQL_CONNECTION_STRING }}"
          $updatedJson = $appSettings | ConvertTo-Json -Depth 10
          $bytes = [System.Text.Encoding]::UTF8.GetBytes($updatedJson)
          Invoke-RestMethod -Uri "$baseUrl/appsettings.json" -Method Put -Headers $headers -Body $bytes
          Write-Host "appsettings.json updated"

          # Write installed.htm
          try { Invoke-RestMethod -Uri "$baseUrl/Installation/" -Method Put -Headers $headers } catch {}
          $htmBytes = [System.Text.Encoding]::UTF8.GetBytes("Installed")
          Invoke-RestMethod -Uri "$baseUrl/Installation/installed.htm" -Method Put -Headers $headers -Body $htmBytes
          Write-Host "installed.htm written"

          # Verify
          Write-Host "=== Verifying appsettings.json ==="
          $verify = Invoke-RestMethod -Uri "$baseUrl/appsettings.json" -Method Get -Headers $getHeaders
          Write-Host "DataProvider: $($verify.ConnectionStrings.DataProvider)"
          Write-Host "ConnectionString starts with: $($verify.ConnectionStrings.ConnectionString.Substring(0,50))"
          Write-Host "=================================="

          Write-Host "All done!"
